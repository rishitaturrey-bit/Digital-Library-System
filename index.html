<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Digital Library System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand" href="#">Digital Library</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#home">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#addbook">Add Book</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#books">Book List</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#contact">Contact</a>
</li>

</ul>

</div>

</div>

</nav>

<!-- Home -->

<section id="home" class="container mt-5">

<h2>Welcome to Digital Library</h2>

<p>Manage your books easily using this Digital Library System.</p>

</section>

<!-- Add Book -->

<section id="addbook" class="container mt-5">

<h3>Add Book</h3>

<form id="bookForm">

<input type="text" id="title" class="form-control mb-3" placeholder="Book Title">

<input type="text" id="author" class="form-control mb-3" placeholder="Author">

<input type="text" id="category" class="form-control mb-3" placeholder="Category">

<button class="btn btn-success">Add Book</button>

</form>

</section>

<!-- Search -->

<section class="container mt-5">

<input type="text" id="search" class="form-control" placeholder="Search Book">

</section>

<!-- Book List -->

<section id="books" class="container mt-5">

<h3>Book List</h3>

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>Title</th>
<th>Author</th>
<th>Category</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="bookList">

</tbody>

</table>

</section>

<!-- Contact -->

<section id="contact" class="container mt-5 mb-5">

<h3>Contact</h3>

<p>Email : library@gmail.com</p>

<p>Phone : 9876543210</p>

</section>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
